name: Auto Generate Article

on:
  schedule:
    - cron: '0 8 */2 * *'   # Tous les 2 jours à 8h UTC
  workflow_dispatch:          # Déclenchement manuel possible

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai requests

      - name: Generate article
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python generate_article.py

      - name: Commit and push
        run: |
          git config user.name  "NewsPorto Bot"
          git config user.email "bot@newsporto.fr"
          git add articles/
          git diff --staged --quiet || git commit -m "🤖 Nouvel article généré automatiquement"
          git push
